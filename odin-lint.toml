# odin-lint configuration file
# Clippy-inspired configuration with enhanced flexibility
# This file controls which rules run on which paths

# Scope-aware naming rules (C016-C018)
# C016 is on by default (standard Odin style).
# C017 and C018 are opt-in — enable them for projects that use these conventions.
# NOTE: if you enable C018, also disable C003 to avoid conflicting diagnostics.
[domains]
ffi             = true    # enable C011 FFI safety rules
odin_2026       = true    # enable C009, C010 migration rules
semantic_naming = false   # enable C012 semantic ownership hints (opt-in)
dead_code       = false   # enable C014, C015 dead code detection (opt-in, project-wide)

[naming]
c016 = true   # local variables must be snake_case
c017 = false  # package-level variables must be camelCase (opt-in)
c018 = false  # @(private) procs snake_case / public procs PascalCase (opt-in)
c020 = false  # short variable/parameter names flagged (opt-in)
c020_min_length = 3          # flag names shorter than this (1-2 char by default)
c020_allowed = "i,j,k,x,y,z,n,ok,err,db,id"  # always-OK short names

[rules]
# Global rule configuration with categories (Clippy-inspired)
C001 = { level = "error", category = "correctness" }
C002 = { level = "error", category = "correctness" }
C003 = { level = "warn", category = "style" }
C004 = { level = "warn", category = "style" }
C005 = { level = "warn", category = "style" }
C006 = { level = "warn", category = "style" }
C007 = { level = "warn", category = "style" }
C008 = { level = "warn", category = "style" }

[ignore]
# Paths to completely exclude from linting
# Uses glob patterns
paths = [
    "vendor/**",      # Exclude vendor directories
    "core/**",        # Exclude core library (as discussed)
    "generated/**",   # Exclude generated code
    "test/fixtures/**", # Exclude test fixtures
    "examples/**"     # Exclude example code
]

# Clippy-inspired: Per-file suppression comments
[suppression]
enable_inline_comments = true
comment_prefix = "odin-lint: ignore="

# Performance thresholds (Clippy-inspired)
[performance]
complexity_threshold = 15      # Cyclomatic complexity
param_count_threshold = 5      # Max parameters
nested_depth_threshold = 4     # Max nested blocks

# CI/CD integration settings (Clippy-inspired)
[ci]
fail_on_warnings = true       # Fail build on warnings
strict_mode = false           # Enable all rules
report_format = "text"        # or "json", "sarif"

# Rule-specific enhancements
[rules.C001]
exclude_paths = ["benchmarks/**", "performance/**"]
config = {
    alloc_functions = ["make", "new", "alloc"],
    ignore_contexts = ["performance_critical", "test_code"],
    # Clippy-inspired: Allow list for known safe patterns
    safe_patterns = [
        "context.allocator",
        "temporary_allocator"
    ]
}

[rules.C003]
config = {
    # Naming convention patterns
    variable_pattern = "^[a-z][a-z0-9_]*$",
    type_pattern = "^[A-Z][a-zA-Z0-9]*$",
    procedure_pattern = "^[a-z][a-z0-9_]*$",
    # Allow common acronyms
    allowed_acronyms = ["HTTP", "URL", "JSON", "XML"]
}